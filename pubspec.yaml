name: nija
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_quill: ^11.4.1
  cryptography: ^2.7.0
  file_picker: ^10.3.2
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  local_auth: ^3.0.1
  flutter_secure_storage: ^9.2.4
  share_plus: ^11.1.0
  google_sign_in: ^6.3.0
  googleapis: ^14.0.0
  http: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - nija.png
    - assets/branding/nija_mark.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/nija_mark.png"
  min_sdk_android: 21
  remove_alpha_ios: true
